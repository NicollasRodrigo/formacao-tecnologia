<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 20 - Formulário</title>
  <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body>
  <main class="container">
    <h1>Aula 20 - Formulário</h1>

    <form class="form" action="" method="get">
      <label for="nome">Nome</label>
      <input type="text" class="nome" id="nome" name="nome">

      <label for="sobrenome">Sobrenome</label>
      <input type="text" class="sobrenome" id="sobrenome" name="sobrenome">

      <label for="peso">Peso</label>
      <input type="number" class="peso" id="peso" name="peso" step="0.01" min="0">

      <label for="altura">Altura</label>
      <input type="number" class="altura" id="altura" name="altura" step="0.01" min="0">

      <button type="submit">Enviar</button>
    </form>

    <div class="resultado"></div>
  </main>

  <script src="./js/script.js"></script>
</body>
</html>
