<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 13 - Exercício</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
</head>
<body>
  <main class="container">
    <h1>Aula 13 - Exercício</h1>
    <div class="info-list" id="resultado"></div>
  </main>

  <script>
    const nome = prompt('Digite seu nome completo:') || '';
    const resultado = document.getElementById('resultado');

    resultado.innerHTML += `<p>Seu nome é: <strong>${nome}</strong></p>`;
    resultado.innerHTML += `<p>Seu nome tem <strong>${nome.length}</strong> letras</p>`;
    resultado.innerHTML += `<p>A segunda letra do seu nome é: <strong>${nome.charAt(1)}</strong></p>`;
    resultado.innerHTML += `<p>O primeiro índice da letra "a" no seu nome é: <strong>${nome.indexOf('a')}</strong></p>`;
    resultado.innerHTML += `<p>O último índice da letra "a" no seu nome é: <strong>${nome.lastIndexOf('a')}</strong></p>`;
    resultado.innerHTML += `<p>As últimas 3 letras do seu nome são: <strong>${nome.slice(-3)}</strong></p>`;
    resultado.innerHTML += `<p>As palavras do seu nome são: <strong>${nome.split(' ').join(', ')}</strong></p>`;
    resultado.innerHTML += `<p>Seu nome com letras maiúsculas: <strong>${nome.toUpperCase()}</strong></p>`;
    resultado.innerHTML += `<p>Seu nome com letras minúsculas: <strong>${nome.toLowerCase()}</strong></p>`;
  </script>
</body>
</html>
